<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>냥코에디터 웹</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.1/full/pyodide.js"></script>
  <style> body { font-family: sans-serif; } textarea { width: 100%; height: 200px; } </style>
</head>
<body>
  <h1>냥코에디터 웹 (BCSFE)</h1>
  <label>이어하기 코드: <input id="transfer" placeholder="Transfer Code"></label><br>
  <label>인증번호: <input id="confirm" placeholder="Confirmation Code"></label><br>
  <label>국가: <select id="country"><option>kr</option></select></label><br>
  <button onclick="loadSave()">로드</button>
  <textarea id="output" placeholder="결과..."></textarea>
  <button onclick="uploadSave()">업로드 (새 코드 생성)</button>
  <script>
  let pyodide, bcsfe;
  async function main() {
    pyodide = await loadPyodide();
    await pyodide.loadPackage(['micropip']);
    // BCSFE 설치 (소스 복사하거나 micropip)
    await pyodide.runPythonAsync(`
      import micropip
      await micropip.install('bcsfe==3.0.0b7')  # 최신 버전
      from bcsfe import main as bcsfe_main
      bcsfe = bcsfe_main
    `);
    console.log('BCSFE 로드 완료!');
  }
  main();
  async function loadSave() {
    let transfer = document.getElementById('transfer').value;
    let confirm = document.getElementById('confirm').value;
    let country = document.getElementById('country').value;
    let result = await pyodide.runPythonAsync(`
      # BCSFE 로직 호출 (CLI 시뮬)
      save_data = bcsfe.download_save('\( {transfer}', ' \){confirm}', '${country}')
      print('세이브 로드됨. 편집 시작.')
    `);
    document.getElementById('output').value = result;
  }
  // 업로드/편집 로직 추가 (stdin/out 리다이렉트)
  </script>
</body>
</html>
