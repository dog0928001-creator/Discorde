<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>냥코에디터 웹 (BCSFE Pyodide)</title>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.27.3/full/pyodide.js"></script>
  <!-- 스타일은 그대로 -->
  <style>
    body { font-family: 'Segoe UI', sans-serif; max-width: 1200px; margin: auto; padding: 20px; background: #f0f8ff; }
    h1 { color: #ff4500; text-align: center; }
    .section { background: white; border-radius: 10px; padding: 20px; margin: 10px 0; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
    input, select, button { padding: 10px; margin: 5px; border: 1px solid #ddd; border-radius: 5px; font-size: 16px; }
    button { background: #ff6347; color: white; cursor: pointer; }
    button:hover { background: #ff4500; }
    textarea { width: 100%; height: 200px; font-family: monospace; }
    #output { background: #f5f5f5; white-space: pre-wrap; max-height: 300px; overflow-y: auto; padding: 10px; border-radius: 5px; }
  </style>
</head>
<body>
  <h1>🐱 냥코에디터 웹 (BCSFE Pyodide)</h1>

  <div class="section">
    <h2>1. 세이브 로드</h2>
    <input id="transfer" placeholder="이어하기 코드">
    <input id="confirm" placeholder="인증번호">
    <select id="country">
      <option value="kr">한국 (kr)</option>
      <option value="en">영어 (en)</option>
    </select>
    <button onclick="loadSave()">로드</button>
    <div id="status">대기중...</div>
  </div>

  <div class="section" id="editor" style="display:none;">
    <textarea id="code" placeholder="save.player.cat_food = 99999\nprint(save.player.cat_food)"></textarea>
    <button onclick="runCode()">실행</button>
    <button onclick="upload()">업로드 (새 코드 생성)</button>
    <pre id="output"></pre>
  </div>

  <script>
    let pyodide;
    async function init() {
      pyodide = await loadPyodide();
      document.getElementById("status").innerText = "Pyodide 준비 완료";
    }
    init();

    async function loadSave() {
      let transfer = document.getElementById("transfer").value;
      let confirm = document.getElementById("confirm").value;
      let country = document.getElementById("country").value;
      document.getElementById("status").innerText = "세이브 로딩 중... (30초\~1분)";

      try {
        await pyodide.runPythonAsync(`
          import micropip
          await micropip.install('bcsfe')
          from bcsfe import download_save
          global save
          save = download_save("\( {transfer}", " \){confirm}", "${country}")
          print("로드 성공!")
        `);
        document.getElementById("status").innerText = "✅ 로드 완료!";
        document.getElementById("editor").style.display = "block";
      } catch(e) {
        document.getElementById("status").innerText = "❌ 실패: " + e;
      }
    }

    async function runCode() {
      let code = document.getElementById("code").value;
      let out = document.getElementById("output");
      try {
        let result = await pyodide.runPythonAsync(code);
        out.innerText += result || "실행 완료\n";
      } catch(e) {
        out.innerText += "에러: " + e + "\n";
      }
    }

    async function upload() {
      try {
        let result = await pyodide.runPythonAsync(`
          new_code, new_confirm = save.upload_save()
          f"새 코드: {new_code}\\n인증번호: {new_confirm}"
        `);
        alert(result);
      } catch(e) {
        alert("업로드 실패: " + e);
      }
    }
  </script>
</body>
</html>
